apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream monolith {
            server monolith:8000;
        }
        upstream auth {
            server auth-service:8001;
        }
        upstream messaging {
            server messaging-service:8002;
        }
        upstream presence {
            server presence-service:8003;
        }
        server {
            listen 8080;
            location /auth/ {
                proxy_pass http://auth/;
                proxy_set_header Host $host;
            }
            location /messages/ {
                proxy_pass http://messaging/messages/;
                proxy_set_header Host $host;
            }
            location /presence/ {
                proxy_pass http://presence/presence/;
                proxy_set_header Host $host;
            }
            location /groups/ws/ {
                proxy_pass http://monolith/groups/ws/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
            location / {
                proxy_pass http://monolith/;
                proxy_set_header Host $host;
            }
        }
    }