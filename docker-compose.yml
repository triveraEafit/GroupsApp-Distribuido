services:

  postgres:
    image: postgres:16
    container_name: groupsapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: groupsapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:16
    container_name: groupsapp-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: password
    entrypoint: >
      bash -c "psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='auth_db'\" | grep -q 1 || psql -h postgres -U postgres -c \"CREATE DATABASE auth_db;\""
    restart: "no"

  messaging-db-init:
    image: postgres:16
    container_name: groupsapp-messaging-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: password
    entrypoint: >
      bash -c "psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='messaging_db'\" | grep -q 1 || psql -h postgres -U postgres -c \"CREATE DATABASE messaging_db;\""
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: groupsapp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: groupsapp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: groupsapp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  monolith:
    build: ./monolith
    container_name: groupsapp-monolith
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/groupsapp
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      UPLOAD_DIR: uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./monolith:/app
      - uploads_data:/app/uploads

  auth-service:
    build: ./auth-service
    container_name: groupsapp-auth
    ports:
      - "8001:8001"
      - "50051:50051"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/auth_db
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GRPC_PORT: 50051
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  messaging-service:
    build: ./messaging-service
    container_name: groupsapp-messaging
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/messaging_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
      GRPC_AUTH_HOST: auth-service
      GRPC_AUTH_PORT: 50051
    depends_on:
      messaging-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  presence-service:
    build: ./presence-service
    container_name: groupsapp-presence
    ports:
      - "8003:8003"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway:
    image: nginx:alpine
    container_name: groupsapp-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - monolith
      - auth-service
      - messaging-service
      - presence-service

volumes:
  postgres_data:
  uploads_data: