apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      containers:
      - name: messaging-service
        image: groupsapp_d-messaging-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/messaging_db"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-svc:9092"
        - name: SECRET_KEY
          value: "super-secret-key-change-in-production"
        - name: ALGORITHM
          value: "HS256"
        - name: GRPC_AUTH_HOST
          value: "auth-service"
        - name: GRPC_AUTH_PORT
          value: "50051"
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
spec:
  selector:
    app: messaging-service
  ports:
  - port: 8002
    targetPort: 8002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: messaging-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: messaging-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50